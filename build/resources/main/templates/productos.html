<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tienda - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { padding: 20px; } </style>
</head>
<body>

<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center">
        <a href="/productos" class="me-3 text-decoration-none fw-bold text-dark">Comprar</a>
        <a href="/ventas" class="me-3 text-decoration-none">Ventas Realizadas</a>

        <a th:if="${usuario != null && usuario.confirmarAdmin}"
           href="/admin" class="me-3 text-decoration-none">Administrar Productos</a>

        <a th:if="${usuario == null}"
           href="/login" class="me-3 text-decoration-none text-primary fw-bold">Iniciar Sesión</a>

        <th:block th:if="${usuario != null}">
            <span class="me-3 text-muted" th:text="${usuario.nombre}">Usuario</span>
            <a href="/carrito" class="btn btn-outline-primary btn-sm me-2">
                Carrito (<span th:text="${cantidadCarro}">0</span>)
            </a>
            <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>
        </th:block>
    </div>
</nav>

<h2 class="mb-4">Listado de Productos</h2>

<div class="row row-cols-1 row-cols-md-3 g-4">
    <div class="col" th:each="p : ${productos}">
        <div class="card h-100 shadow-sm">
            <a th:href="'/producto/' + ${p.id}">
                <img th:if="${!#lists.isEmpty(p.imagenes)}"
                     th:src="'data:image/jpeg;base64,' + ${p.imagenes[0].base64}"
                     class="card-img-top" style="height:180px; object-fit:cover;">
                <div th:if="${#lists.isEmpty(p.imagenes)}"
                     class="bg-light d-flex align-items-center justify-content-center"
                     style="height:180px;">
                    <span class="text-muted">Sin imagen</span>
                </div>
            </a>
            <div class="card-body">
                <h5 class="card-title" th:text="${p.nombre}"></h5>
                <p class="card-text text-muted small"
                   th:text="${p.descripcion != null ? #strings.abbreviate(p.descripcion, 100) : 'Sin descripción'}"></p>
                <p class="fw-bold">RD$ <span th:text="${p.precio}"></span></p>
                <p class="text-muted small">Stock: <span th:text="${p.inventario}"></span></p>
            </div>
            <div class="card-footer">
                <form action="/carrito/add" method="post" class="d-flex gap-2">
                    <input type="hidden" name="productoId" th:value="${p.id}">
                    <input type="number" name="cantidad" value="1" min="1"
                           class="form-control form-control-sm w-25">
                    <button type="submit" class="btn btn-success btn-sm w-75">Agregar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Paginación (Punto 8) -->
<nav class="mt-4" th:if="${totalPaginas > 1}">
    <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${!hayAnterior ? 'disabled' : ''}">
            <a class="page-link" th:href="'/productos?page=' + ${paginaActual - 1}">Anterior</a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPaginas)}"
            th:classappend="${i == paginaActual ? 'active' : ''}">
            <a class="page-link" th:href="'/productos?page=' + ${i}" th:text="${i}"></a>
        </li>
        <li class="page-item" th:classappend="${!haySiguiente ? 'disabled' : ''}">
            <a class="page-link" th:href="'/productos?page=' + ${paginaActual + 1}">Siguiente</a>
        </li>
    </ul>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
