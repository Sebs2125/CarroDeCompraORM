<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin - Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
    </style>
</head>

<body>

<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center gap-3">
        <a href="/productos" class="text-decoration-none">Comprar</a>
        <a href="/ventas"    class="text-decoration-none">Ventas</a>
        <a href="/admin"     class="text-decoration-none fw-bold text-dark">Admin Productos</a>
        <a href="/dashboard" class="text-decoration-none text-success fw-bold">📊 Dashboard</a>
        <span class="text-muted" th:if="${usuario != null}" th:text="${usuario.nombre}">Admin</span>
        <a href="/logout"    class="text-decoration-none text-danger fw-bold">Salir</a>

        <!-- Contador usuarios en línea -->
        <span class="badge bg-primary">
            <span id="onlineCount">–</span> en línea
        </span>
    </div>
</nav>

<h2 class="mb-4">Administración de Productos</h2>

<!-- Crear nuevo producto -->
<div class="bg-light p-4 rounded mb-4">
    <h5 class="mb-3">Registrar Nuevo Producto</h5>
    <form action="/admin/productos" method="post" class="row g-3">
        <div class="col-md-4">
            <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" name="precio" class="form-control" placeholder="Precio" required>
        </div>
        <div class="col-md-2">
            <input type="number" name="inventario" class="form-control" placeholder="Stock" required>
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">Crear Producto</button>
        </div>
    </form>
</div>

<!-- Tabla de productos -->
<table class="table table-sm table-bordered align-middle">
    <thead class="table-secondary">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Precio (RD$)</th>
        <th>Stock</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${productos}">
        <td th:text="${p.id}"></td>
        <td>
            <a th:href="'/productos/' + ${p.id}" th:text="${p.nombre}"
               class="text-decoration-none"></a>
        </td>
        <td th:text="${p.precio}"></td>
        <td th:text="${p.inventario}"></td>
        <td>
            <!-- Editar -->
            <button type="button" class="btn btn-warning btn-sm"
                    data-bs-toggle="modal"
                    th:data-bs-target="'#modalEditar' + ${p.id}">
                Editar
            </button>

            <!-- Eliminar producto -->
            <form th:action="'/admin/productos/' + ${p.id} + '/delete'" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm"
                        onclick="return confirm('¿Eliminar este producto?')">
                    Eliminar
                </button>
            </form>

            <!-- Ver comentarios del producto -->
            <a th:href="'/productos/' + ${p.id}" class="btn btn-outline-secondary btn-sm">
                Ver comentarios
            </a>

            <!-- Modal Editar -->
            <div class="modal fade" th:id="'modalEditar' + ${p.id}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-warning">
                            <h5 class="modal-title text-dark">Editar Producto</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <form th:action="'/admin/productos/' + ${p.id} + '/update'" method="post">
                            <div class="modal-body text-start">
                                <input type="hidden" name="id" th:value="${p.id}">
                                <label class="fw-bold mt-2">Nombre:</label>
                                <input type="text" name="nombre" th:value="${p.nombre}" class="form-control" required>
                                <label class="fw-bold mt-2">Precio:</label>
                                <input type="number" step="0.01" name="precio" th:value="${p.precio}" class="form-control" required>
                                <label class="fw-bold mt-2">Stock:</label>
                                <input type="number" name="inventario" th:value="${p.inventario}" class="form-control" required>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-success">Guardar Cambios</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </td>
    </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    var USERNAME = /*[[${usuario != null ? usuario.nombre : ''}]]*/ '';

    var wsUsers;
    function connectUsersWS() {
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        wsUsers = new WebSocket(proto + '//' + location.host + '/ws/users');
        wsUsers.onopen = function() {
            if (USERNAME) wsUsers.send(JSON.stringify({ action: 'login', username: USERNAME }));
        };
        wsUsers.onmessage = function(event) {
            try {
                var msg = JSON.parse(event.data);
                if (msg.type === 'user_count') {
                    document.getElementById('onlineCount').textContent = msg.count;
                }
            } catch(e) {}
        };
        wsUsers.onclose = function() { setTimeout(connectUsersWS, 3000); };
    }
    connectUsersWS();
    window.addEventListener('beforeunload', function() {
        if (wsUsers && wsUsers.readyState === WebSocket.OPEN)
            wsUsers.send(JSON.stringify({ action: 'logout' }));
    });
</script>
</body>
</html>
