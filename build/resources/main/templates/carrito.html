<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tienda Marcar - Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
    </style>
</head>

<body>

<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center">
        <a href="/productos" class="me-3 text-decoration-none">Comprar</a>
        <a href="/ventas" class="me-3 text-decoration-none">Ventas Realizadas</a>

        <a th:if="${user != null && user.confirmarAdmin}"
           href="/admin" class="me-3 text-decoration-none">Administrar Productos</a>

        <th:block th:if="${user != null}">
            <span class="me-3 text-muted" th:text="${user.nombre}">user</span>
            <a href="/carrito" class="btn btn-outline-primary btn-sm me-2">
                Carrito (<span th:text="${CantidadProducto != null ? CantidadProducto : 0}">0</span>)
            </a>
            <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>
        </th:block>
    </div>
</nav>

<h2 class="mb-4">Carrito de Compra</h2>

<!-- Carrito vacío -->
<div th:if="${#lists.isEmpty(productos)}" class="text-center text-muted py-5">
    <p class="fs-5">Tu carrito está vacío.</p>
    <a href="/productos" class="btn btn-primary btn-sm">Ver productos</a>
</div>

<!-- Carrito con productos -->
<div th:if="${!#lists.isEmpty(productos)}">

    <!-- Todo dentro de un solo form -->
    <form action="/carrito/procesar" method="post" onsubmit="return validarCliente()">

        <!-- Nombre del cliente DENTRO del form -->
        <div class="mb-3">
            <label class="fw-bold" for="nombreCliente">Nombre del Cliente:</label>
            <input type="text" id="nombreCliente" name="nombreCliente"
                   class="form-control w-50 mt-1"
                   placeholder="Escribe tu nombre" required>
        </div>

        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>Producto</th>
                <th>Precio (RD$)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.precio}"></td>
            </tr>
            </tbody>
            <tfoot>
            <tr class="fw-bold table-secondary">
                <td class="text-end">Total:</td>
                <td>RD$ <span th:text="${total}">0.00</span></td>
            </tr>
            </tfoot>
        </table>

        <div class="mt-3 d-flex gap-2">
            <button type="submit" class="btn btn-success">Procesar Compra</button>
        </div>

    </form>

    <!-- Limpiar carrito va en su propio form separado -->
    <form action="/carrito/limpiar" method="post" class="mt-2">
        <button type="submit" class="btn btn-outline-secondary">Limpiar Carrito</button>
    </form>

</div>

<script>
    function validarCliente() {
        const nombre = document.getElementById('nombreCliente').value.trim();
        if (!nombre) {
            alert('Debes ingresar tu nombre para procesar la compra');
            return false;
        }
        return true;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
