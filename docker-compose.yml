services:

  # ── Servidor H2 en modo servidor
  # Necesario porque HibernateConsulta.java usa jdbc:h2:tcp://
  h2-server:
    image: oscarfonts/h2:latest
    container_name: h2-server
    restart: unless-stopped
    volumes:
      - h2-data:/opt/h2-data        # Persistencia de la base de datos
    networks:
      - app-network
    # Puerto 9092 es el puerto TCP de H2 (tu HibernateConsulta usa ese puerto)
    expose:
      - "9092"

  # ── Aplicación Javalin — CarritoDeCompra
  app:
    build: .                          # Construye desde el Dockerfile local
    container_name: carrito-app
    restart: unless-stopped
    depends_on:
      - h2-server                     # Espera a que H2 esté listo primero
    environment:
      PORT: 8080
      # Aquí "h2-server" es el nombre del servicio Docker, no localhost
      # Esto sobreescribe HibernateConsulta.java si lo adaptas para leer env vars
      DB_URL: jdbc:h2:tcp://h2-server:9092/~/carritodb
      DB_USER: sa
      DB_PASS: ""
    ports:
      - "8080:8080"                   # Exponer al host → acceso en localhost:8080
    networks:
      - app-network

volumes:
  h2-data:                            # Volumen nombrado para persistir datos H2

networks:
  app-network:
    driver: bridge                    # Red interna entre contenedores