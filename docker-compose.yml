services:

  # ── H2 en modo servidor TCP ──────────────────────────────────────────────
  h2-server:
    image: oscarfonts/h2:latest
    container_name: h2-server
    restart: unless-stopped
    volumes:
      - h2-data:/opt/h2-data
    networks:
      - app-network
    expose:
      - "9092"

  # ── Aplicación Javalin + WebSockets ─────────────────────────────────────
  app:
    build: .
    container_name: carrito-app
    restart: unless-stopped
    depends_on:
      - h2-server
    environment:
      PORT: 8080
      DB_URL: jdbc:h2:tcp://h2-server:9092/~/carritodb
      DB_USER: sa
      DB_PASS: ""
    ports:
      # Puerto HTTP + WebSocket (WS usa el mismo puerto que HTTP en Javalin/Jetty)
      - "8080:8080"
    networks:
      - app-network

volumes:
  h2-data:

networks:
  app-network:
    driver: bridge