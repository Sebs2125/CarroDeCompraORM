<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tienda Marcar - Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
    </style>
</head>

<body>

<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center">
        <a href="/productos" class="me-3 text-decoration-none">Comprar</a>
        <a href="/ventas" class="me-3 text-decoration-none">Ventas Realizadas</a>

        <a th:if="${usuario != null && usuario.confirmarAdmin}"
           href="/admin" class="me-3 text-decoration-none">Administrar Productos</a>

        <th:block th:if="${usuario != null}">
            <span class="me-3 text-muted" th:text="${usuario.nombre}">Usuario</span>
            <a href="/carrito" class="btn btn-outline-primary btn-sm me-2">
                Carrito (<span th:text="${cantidadCarro != null ? cantidadCarro : 0}">0</span>)
            </a>
            <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>
        </th:block>
    </div>
</nav>

<h2 class="mb-4">Carrito de Compra</h2>

<!-- Carrito vacío -->
<div th:if="${#lists.isEmpty(productos)}" class="text-center text-muted py-5">
    <p class="fs-5">Tu carrito está vacío.</p>
    <a href="/productos" class="btn btn-primary btn-sm">Ver productos</a>
</div>

<!-- Carrito con productos -->
<div th:if="${!#lists.isEmpty(productos)}">

    <div class="mb-3">
        <label class="fw-bold">Nombre del Cliente:</label>
        <input type="text" id="nombreCliente" class="form-control w-50 mt-1"
               placeholder="Escribe tu nombre" required>
    </div>

    <table class="table table-hover align-middle">
        <thead class="table-light">
        <tr>
            <th>Producto</th>
            <th>Precio (RD$)</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${productos}">
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.precio}"></td>
            <td>
                <form th:action="'/carrito/remove/' + ${p.id}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                </form>
            </td>
        </tr>
        </tbody>
        <tfoot>
        <tr class="fw-bold table-secondary">
            <td class="text-end">Total:</td>
            <td>RD$ <span th:text="${total}">0.00</span></td>
            <td></td>
        </tr>
        </tfoot>
    </table>

    <div class="mt-3 d-flex gap-2">
        <!-- Procesar compra -->
        <form action="/carrito/procesar" method="post" id="formProcesar">
            <input type="hidden" name="nombreCliente" id="hiddenCliente">
            <button type="submit" class="btn btn-success"
                    onclick="document.getElementById('hiddenCliente').value = document.getElementById('nombreCliente').value">
                Procesar Compra
            </button>
        </form>

        <!-- Limpiar carrito -->
        <form action="/carrito/limpiar" method="post">
            <button type="submit" class="btn btn-outline-secondary">Limpiar Carrito</button>
        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
