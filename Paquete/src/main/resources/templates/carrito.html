<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tienda Marcar - Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }

        .header-tienda {
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="header-tienda d-flex justify-content-between align-items-center">
        <div class="fw-bold fs-4">Logo - Marcar</div>
        <nav>
            <a href="/productos" class="me-3 text-decoration-none">Comprar</a>
            <a href="/ventas" class="me-3 text-decoration-none">Ventas Realizadas</a>
            <a href="/admin" class="me-3 text-decoration-none">Administrar Productos</a>

            <a href="/login" class="me-3 fw-bold text-decoration-none text-primary">Iniciar Sesión</a>
            <a href="/logout" class="me-3 text-decoration-none text-danger">Salir</a>

            <a href="/carrito" class="btn btn-outline-primary btn-sm">
                Carrito (<span th:text="${cantidadCarro != null ? cantidadCarro : 0}">0</span>)
            </a>
        </nav>
    </div>

    <h2 class="mb-4">Carrito de Compra</h2>

    <form action="/productos" method="get">
        <div class="mb-3">
            <label class="fw-bold">Nombre del Cliente:</label>
            <input type="text" name="nombreCliente" class="form-control w-50" required>
        </div>

        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio (RD$)</th>
                    <th>Total (RD$)</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${productos}">
                    <td th:text="${p.nombre}"></td>
                    <td th:text="${p.precio}"></td>
                    <td th:text="${p.precio}"></td>
                    <td>
                        <button type="button" class="btn btn-danger btn-sm" disabled>Eliminar</button>
                    </td>
                </tr>
            </tbody>
            <tfoot>
                <tr class="fw-bold">
                    <td colspan="2" class="text-end">Total:</td>
                    <td th:text="${total}">0.00</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>

        <div class="mt-4">
            <button type="submit" class="btn btn-success">Procesar Compra</button>
            <button type="submit" formaction="/carrito/limpiar" formmethod="post"
                class="btn btn-outline-secondary">Limpiar Carro</button>
        </div>
    </form>
</body>

</html>
