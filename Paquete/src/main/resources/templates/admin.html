<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tienda Marcar - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .header-tienda {
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        .img-thumb {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center">
        <a href="/productos" class="me-3 text-decoration-none">Comprar</a>
        <a href="/ventas" class="me-3 text-decoration-none">Ventas Realizadas</a>
        <a href="/admin" class="me-3 text-decoration-none fw-bold text-dark">Administrar Productos</a>
        <span class="me-3 text-muted" th:if="${usuario != null}" th:text="${usuario.nombre}">Admin</span>
        <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>
    </div>
</nav>

<h2 class="mb-4">Administración de Productos</h2>

<div class="bg-light p-4 rounded mb-4">
    <h5 class="mb-3">Registrar Nuevo Producto</h5>

    <!-- enctype multipart obligatorio para subir imágenes -->
    <form action="/admin/productos" method="post" enctype="multipart/form-data" class="row g-3">

        <div class="col-md-4">
            <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" name="precio" class="form-control" placeholder="Precio" required>
        </div>
        <div class="col-md-2">
            <input type="number" name="inventario" class="form-control" placeholder="Cantidad" required>
        </div>

        <!-- Descripción -->
        <div class="col-md-4">
            <input type="text" name="descripcion" class="form-control" placeholder="Descripción del producto">
        </div>

        <!--  Imágenes  -->
        <div class="col-md-8">
            <label class="form-label mb-1 text-muted" style="font-size:.82rem;">
                Imágenes del producto <span class="text-danger">*</span>
            </label>
            <input type="file" name="imagenes" class="form-control" accept="image/*" multiple required>
        </div>

        <div class="col-md-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">Crear Producto</button>
        </div>

    </form>
</div>

<!-- Tabla de Productos -->
<table class="table table-sm table-bordered align-middle">
    <thead class="table-secondary">
    <tr>
        <th>ID</th>
        <th>Imagen</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Precio (RD$)</th>
        <th>Stock</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${productos}">
        <td th:text="${p.id}"></td>

        <!-- Mostrar imagen en tabla -->
        <td>
            <img th:if="${p.imagenBase64 != null}"
                 th:src="'data:image/jpeg;base64,' + ${p.imagenBase64}"
                 class="img-thumb" alt="Imagen producto">
            <span th:if="${p.imagenBase64 == null}" class="text-muted" style="font-size:.8rem;">Sin imagen</span>
        </td>

        <td th:text="${p.nombre}"></td>
        <td th:text="${p.descripcion}"></td>
        <td th:text="${p.precio}"></td>
        <td th:text="${p.inventario}"></td>

        <td>

            <button type="button" class="btn btn-warning btn-sm"
                    data-bs-toggle="modal"
                    th:data-bs-target="'#modalEditar' + ${p.id}">Editar</button>

            <form th:action="'/admin/productos/' + ${p.id} + '/delete'" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm"
                        onclick="return confirm('¿Eliminar este producto?')">Eliminar</button>


            </form>

            <!--Editar-->
            <div class="modal fade" th:id="'modalEditar' + ${p.id}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-warning">
                            <h5 class="modal-title text-dark">Editar Producto</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <!-- poder cambiar imagen  -->
                        <form th:action="'/admin/productos/' + ${p.id} + '/update'"
                              method="post" enctype="multipart/form-data">
                            <div class="modal-body text-start">

                                <input type="hidden" name="id" th:value="${p.id}">

                                <label class="fw-bold mt-2">Nombre:</label>
                                <input type="text" name="nombre" th:value="${p.nombre}"
                                       class="form-control" required>

                                <label class="fw-bold mt-2">Precio:</label>
                                <input type="number" step="0.01" name="precio" th:value="${p.precio}"
                                       class="form-control" required>

                                <label class="fw-bold mt-2">Stock en Inventario:</label>
                                <input type="number" name="inventario" th:value="${p.inventario}"
                                       class="form-control" required>

                                <!--  Descripción en editar -->
                                <label class="fw-bold mt-2">Descripción:</label>
                                <input type="text" name="descripcion" th:value="${p.descripcion}"
                                       class="form-control">

                                <!--   Imagen actual -->
                                <div th:if="${p.imagenBase64 != null}" class="mt-2">
                                    <label class="fw-bold">Imagen actual:</label><br>
                                    <img th:src="'data:image/jpeg;base64,' + ${p.imagenBase64}"
                                         class="img-thumb mt-1">
                                </div>

                                <!--– Nueva imagen (opcional al editar) -->
                                <label class="fw-bold mt-2">Cambiar imagen(es):</label>
                                <input type="file" name="imagenes" class="form-control"
                                       accept="image/*" multiple>
                                <small class="text-muted">Deja vacío para mantener la imagen actual.</small>

                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-success">Guardar Cambios</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>


        </td>
    </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
