<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="mainLayout(content)">

<head>
    <meta charset="UTF-8">
    <title>Tienda Marcar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{padding: 20px;}



    </style>
</head>

    <body>

       <nav class="navbar mb-4 border-bottom pb-2">
           <a class="navbar-brand fw-bold fs-4" href="/templates/productos.html">Carrito compra</a>

           <div class="d-flex align-items-center">
               <a href="/templates/productos.html" class="me-3 text-decoration-none">Compra </a>
               <a href="/templates/ventas.html" class="me-3 text-decoration-none">Ventas Realizada </a>


               <a th:if="${usuario != null && usuario.confirmarAdmin}"
                  href="/templates/admin.html" class="me-3 text-decoration-none">Administrador productos </a>


               <a th:if="${usuario == null}"
                  href="/templates/login.html" class="me-3 text-decoration-none text-primary fw-bold">Iniciar Sesion </a>

               <th:block th:if="${usuario !=null}">
                   <span class="me-3 text-muted" th:text="${usuario.nombre}">Usuario</span>
                   <a href="/templates/carrito.html" class="btn btn-outline-primary btn-sm me-2">
                       Carrito (<span th:text="${cantidadCarro != null ? cantidadCarro : 0}">0</span>
                   </a>
                   <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>



               </th:block>



           </div>


        </nav>
    <main>
        <div th:replace="${content}"></div>


    </main>

       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
