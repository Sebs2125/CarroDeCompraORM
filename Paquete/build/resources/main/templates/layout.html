<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="mainLayout(content)">

<head>
    <meta charset="UTF-8">
    <title>Tienda Marcar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
    <header class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <div class="fw-bold fs-4">Logo - Marcar</div>
        <nav>
            <a href="/productos" class="me-3 text-decoration-none">Comprar</a>
            <a href="/ventas" class="me-3 text-decoration-none">Ventas Realizadas</a>
            <a href="/admin" class="me-3 text-decoration-none">Administrar Productos</a>
            <a href="/carrito" class="btn btn-outline-primary btn-sm">
                Carrito (<span th:text="${cantidadCarro}">0</span>)
            </a>
        </nav>
    </header>

    <main>
        <div th:replace="${content}"></div>
    </main>

    <footer class="mt-5 pt-3 border-top text-center text-muted small">

    </footer>
</body>

</html>
