<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tienda Marcar - Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
    </style>
</head>

<body>

<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center">
        <a href="/productos" class="me-3 text-decoration-none">Comprar</a>
        <a href="/ventas" class="me-3 text-decoration-none fw-bold text-dark">Ventas Realizadas</a>
        <a href="/admin" class="me-3 text-decoration-none">Administrar Productos</a>
        <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>
    </div>
</nav>

<h2 class="mb-4">Registro de Ventas Realizadas</h2>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID Venta</th>
        <th>Cliente</th>
        <th>Artículos</th>
        <th>Total Pagado</th>
        <th>Estado</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(ventas)}">
        <td colspan="5" class="text-center text-muted">Aún no hay ventas registradas.</td>
    </tr>
    <tr th:each="v : ${ventas}">
        <td th:text="${v.id}"></td>
        <td class="fw-bold text-primary" th:text="${v.cliente}"></td>
        <td th:text="${v.cantidadItems}"></td>
        <td class="fw-bold">RD$ <span th:text="${v.total}"></span></td>
        <td><span class="badge bg-success">Pagado</span></td>
    </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
