<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">



<head>
    <meta charset="UTF-8">
    <title>Tienda Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }

        .header-tienda {
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="header-tienda d-flex justify-content-between align-items-center">
        <div class="fw-bold fs-4">Carrito compra </div>
        <nav class="d-flex align-items-center">
            <a href="/productos" class="me-3 text-decoration-none">Comprar</a>
            <a href="/ventas" class="me-3 text-decoration-none">Ventas Realizadas</a>
            <a href="/admin" class="me-3 text-decoration-none">Administrar Productos</a>

            <th:block th:if="${usuario == null}">
                <a href="/login" class="btn btn-sm btn-primary me-2">Iniciar Sesion</a>
            </th:block>

            <th:block th:if="${usuario != null}">
                <span class="me-2 text-muted" th:text="${usuario.nombre}">Usuario</span>

                <a href="/carrito" class="btn btn-sm btn-outline-primary me-2">
                    Carrito (<span th:text="${cantidadCarro}">0</span>)
                </a>

                <a href="/logout" class="btn btn-sm btn-danger">Salir</a>
            </th:block>
        </nav>
    </div>

    <h2 class="mb-4">Listado de Productos</h2>

    <table class="table table-bordered table-striped">
        <thead class="table-light">
            <tr>
                <th>Producto</th>
                <th>Precio (RD$)</th>

            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.precio}"></td>
                <td>
                    <form action="/carrito/add" method="post" class="d-flex gap-2">
                        <input type="hidden" name="productoId" th:value="${p.id}">
                        <input type="number" name="cantidad" value="1" min="1"
                            class="form-control form-control-sm w-25">
                        <button type="submit" class="btn btn-success btn-sm">Agregar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
