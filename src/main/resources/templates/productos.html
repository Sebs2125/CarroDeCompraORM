<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tienda Marcar - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
    </style>
</head>

<body>

<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center">
        <a href="/productos" class="me-3 text-decoration-none fw-bold text-dark">Comprar</a>
        <a href="/ventas" class="me-3 text-decoration-none">Ventas Realizadas</a>

        <!-- usuario viene de ProductoControlador: modelo.put("usuario", usuarioActual) -->
        <a th:if="${usuario != null && usuario.confirmarAdmin}"
           href="/admin" class="me-3 text-decoration-none">Administrar Productos</a>

        <a th:if="${usuario == null}"
           href="/login" class="me-3 text-decoration-none text-primary fw-bold">Iniciar Sesión</a>

        <th:block th:if="${usuario != null}">
            <span class="me-3 text-muted" th:text="${usuario.nombre}">Usuario</span>
            <a href="/carrito" class="btn btn-outline-primary btn-sm me-2">
                Carrito (0)
            </a>
            <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>
        </th:block>
    </div>
</nav>

<h2 class="mb-4">Listado de Productos</h2>

<table class="table table-bordered table-striped align-middle">
    <thead class="table-light">
    <tr>
        <th>Producto</th>
        <th>Precio (RD$)</th>
        <th>Agregar</th>
    </tr>
    </thead>
    <tbody>
    <!-- productos viene de ProductoControlador: modelo.put("productos", ...) -->
    <tr th:each="p : ${productos}">
        <td>
            <a th:href="'/productos/' + ${p.id}"
               th:text="${p.nombre}"
               class="text-decoration-none text-dark fw-bold"></a>
        </td>
        <td th:text="${p.precio}"></td>
        <td>
            <form action="/carrito/add" method="post" class="d-flex gap-2">
                <input type="hidden" name="productoId" th:value="${p.id}">
                <input type="number" name="cantidad" value="1" min="1"
                       class="form-control form-control-sm w-25">
                <button type="submit" class="btn btn-success btn-sm">Agregar</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<!-- Paginación — solo aparece si Java pasa paginaActual y totalPaginas -->
<nav th:if="${totalPaginas != null && totalPaginas > 1}">
    <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${paginaActual == 1} ? 'disabled'">
            <a class="page-link" th:href="'/productos?pagina=' + ${paginaActual - 1}">Anterior</a>
        </li>
        <li class="page-item"
            th:each="n : ${#numbers.sequence(1, totalPaginas)}"
            th:classappend="${n == paginaActual} ? 'active'">
            <a class="page-link" th:href="'/productos?pagina=' + ${n}" th:text="${n}"></a>
        </li>
        <li class="page-item" th:classappend="${paginaActual == totalPaginas} ? 'disabled'">
            <a class="page-link" th:href="'/productos?pagina=' + ${paginaActual + 1}">Siguiente</a>
        </li>
    </ul>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
