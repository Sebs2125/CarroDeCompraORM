<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tienda - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .producto-link {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
        }
        .producto-link:hover {
            text-decoration: underline;
            color: #0a58ca;
        }
        .producto-img {
            width: 72px;
            height: 54px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #dee2e6;
        }
        .sin-img {
            width: 72px;
            height: 54px;
            background: #f0f0f0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #aaa;
            border: 1px solid #dee2e6;
        }
    </style>
</head>

<body>

<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center gap-3">
        <a href="/productos" class="me-1 text-decoration-none fw-bold text-dark">Comprar</a>
        <a href="/ventas" class="text-decoration-none">Ventas Realizadas</a>

        <a th:if="${usuario != null && usuario.confirmarAdmin}"
           href="/admin" class="text-decoration-none">Admin Productos</a>

        <a th:if="${usuario != null && usuario.confirmarAdmin}"
           href="/dashboard" class="text-decoration-none">Dashboard</a>

        <a th:if="${usuario == null}"
           href="/login" class="text-decoration-none text-primary fw-bold">Iniciar Sesion</a>

        <th:block th:if="${usuario != null}">
            <span class="text-muted" th:text="${usuario.nombre}">Usuario</span>
            <a href="/carrito" class="btn btn-outline-primary btn-sm">Carrito</a>
            <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>
        </th:block>

        <span class="badge bg-primary ms-2" title="Usuarios logueados ahora">
            <span id="onlineCount">-</span> en linea
        </span>
    </div>
</nav>

<h2 class="mb-4">Listado de Productos</h2>

<table class="table table-bordered table-striped align-middle">
    <thead class="table-light">
    <tr>
        <th style="width:90px;">Imagen</th>
        <th>Producto</th>
        <th style="width:130px;">Precio (RD$)</th>
        <th style="width:110px;">Stock</th>
        <th style="width:200px;">Agregar</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${productos}">
        <td>
            <a th:href="'/productos/' + ${p.id}">
                <img th:if="${p.imagenBase64 != null and !#strings.isEmpty(p.imagenBase64)}"
                     th:src="'data:image/jpeg;base64,' + ${p.imagenBase64}"
                     class="producto-img" alt="img">
                <div th:if="${p.imagenBase64 == null or #strings.isEmpty(p.imagenBase64)}"
                     class="sin-img">Sin imagen</div>
            </a>
        </td>
        <td>
            <a th:href="'/productos/' + ${p.id}"
               th:text="${p.nombre}"
               class="producto-link"></a>
            <br th:if="${p.descripcion != null and !#strings.isEmpty(p.descripcion)}">
            <small th:if="${p.descripcion != null and !#strings.isEmpty(p.descripcion)}"
                   th:text="${#strings.abbreviate(p.descripcion, 70)}"
                   class="text-muted"></small>
        </td>
        <td th:text="${p.precio}"></td>
        <td>
            <span class="badge"
                  th:classappend="${p.inventario > 0} ? 'bg-success' : 'bg-danger'"
                  th:text="${p.inventario} + ' uds.'"></span>
        </td>
        <td>
            <form action="/carrito/add" method="post" class="d-flex gap-2">
                <input type="hidden" name="productoId" th:value="${p.id}">
                <input type="number" name="cantidad" value="1" min="1"
                       class="form-control form-control-sm" style="width:65px;">
                <button type="submit"
                        class="btn btn-success btn-sm"
                        th:disabled="${usuario == null}">Agregar</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<nav th:if="${totalPaginas > 1}">
    <ul class="pagination">
        <li class="page-item" th:classappend="${!hayAnterior} ? 'disabled'">
            <a class="page-link" th:href="'/productos?page=' + ${paginaActual - 1}">Anterior</a>
        </li>
        <li class="page-item disabled">
            <span class="page-link" th:text="${paginaActual} + ' / ' + ${totalPaginas}"></span>
        </li>
        <li class="page-item" th:classappend="${!haySiguiente} ? 'disabled'">
            <a class="page-link" th:href="'/productos?page=' + ${paginaActual + 1}">Siguiente</a>
        </li>
    </ul>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    var USERNAME = /*[[${usuario != null ? usuario.nombre : ''}]]*/ '';

    var wsUsers;
    var wsRetryDelay = 1000;
    var wsRetryTimer = null;

    function connectUsersWS() {
        if (wsRetryTimer) { clearTimeout(wsRetryTimer); wsRetryTimer = null; }

        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        wsUsers = new WebSocket(proto + '//' + location.host + '/ws/users');

        wsUsers.onopen = function() {
            wsRetryDelay = 1000;
            if (USERNAME) {
                wsUsers.send(JSON.stringify({ action: 'login', username: USERNAME }));
            }
        };

        wsUsers.onmessage = function(event) {
            try {
                var msg = JSON.parse(event.data);
                if (msg.type === 'user_count') {
                    document.getElementById('onlineCount').textContent = msg.count;
                }
            } catch(e) {}
        };

        wsUsers.onclose = function() {
            wsRetryDelay = Math.min(wsRetryDelay * 2, 30000);
            wsRetryTimer = setTimeout(connectUsersWS, wsRetryDelay);
        };

        wsUsers.onerror = function() { /* manejado por onclose */ };
    }

    connectUsersWS();

    window.addEventListener('beforeunload', function() {
        if (wsRetryTimer) clearTimeout(wsRetryTimer);
        if (wsUsers && wsUsers.readyState === WebSocket.OPEN) {
            wsUsers.send(JSON.stringify({ action: 'logout' }));
            wsUsers.close();
        }
    });
</script>
</body>
</html>
