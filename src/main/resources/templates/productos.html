<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tienda - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
    </style>
</head>

<body>

<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center gap-3">
        <a href="/productos" class="me-1 text-decoration-none fw-bold text-dark">Comprar</a>
        <a href="/ventas"   class="text-decoration-none">Ventas Realizadas</a>

        <a th:if="${usuario != null && usuario.confirmarAdmin}"
           href="/admin" class="text-decoration-none">Admin Productos</a>

        <a th:if="${usuario != null && usuario.confirmarAdmin}"
           href="/dashboard" class="text-decoration-none">Dashboard</a>

        <a th:if="${usuario == null}"
           href="/login" class="text-decoration-none text-primary fw-bold">Iniciar Sesión</a>

        <th:block th:if="${usuario != null}">
            <span class="text-muted" th:text="${usuario.nombre}">Usuario</span>
            <a href="/carrito" class="btn btn-outline-primary btn-sm">Carrito</a>
            <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>
        </th:block>

        <!-- Req #2: Contador de usuarios logueados en tiempo real -->
        <span class="badge bg-primary ms-2" title="Usuarios logueados ahora">
            <span id="onlineCount">–</span> en línea
        </span>
    </div>
</nav>

<h2 class="mb-4">Listado de Productos</h2>

<table class="table table-bordered table-striped align-middle">
    <thead class="table-light">
    <tr>
        <th>Producto</th>
        <th>Precio (RD$)</th>
        <th>Stock</th>
        <th>Agregar</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${productos}">
        <td>
            <!-- Link al detalle del producto (con comentarios) -->
            <a th:href="'/productos/' + ${p.id}"
               th:text="${p.nombre}"
               class="text-decoration-none text-dark fw-bold"></a>
        </td>
        <td th:text="${p.precio}"></td>
        <td>
            <span class="badge"
                  th:classappend="${p.inventario > 0} ? 'bg-success' : 'bg-danger'"
                  th:text="${p.inventario} + ' uds.'"></span>
        </td>
        <td>
            <form action="/carrito/add" method="post" class="d-flex gap-2">
                <input type="hidden" name="productoId" th:value="${p.id}">
                <input type="number" name="cantidad" value="1" min="1"
                       class="form-control form-control-sm w-25">
                <button type="submit"
                        class="btn btn-success btn-sm"
                        th:disabled="${usuario == null}">Agregar</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    var USERNAME = /*[[${usuario != null ? usuario.nombre : ''}]]*/ '';

    // ─── WebSocket: contador de usuarios en línea (Req #2) ──────────────────
    var wsUsers;
    function connectUsersWS() {
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        wsUsers = new WebSocket(proto + '//' + location.host + '/ws/users');

        wsUsers.onopen = function() {
            // Si hay un usuario logueado, notificar al servidor
            if (USERNAME) {
                wsUsers.send(JSON.stringify({ action: 'login', username: USERNAME }));
            }
        };

        wsUsers.onmessage = function(event) {
            try {
                var msg = JSON.parse(event.data);
                if (msg.type === 'user_count') {
                    document.getElementById('onlineCount').textContent = msg.count;
                }
            } catch(e) { console.error('WS parse error', e); }
        };

        wsUsers.onclose = function() {
            // Reconexión automática
            setTimeout(connectUsersWS, 3000);
        };

        wsUsers.onerror = function(err) {
            console.error('WS users error:', err);
        };
    }

    connectUsersWS();

    // Al salir de la página, notificar logout del contador
    window.addEventListener('beforeunload', function() {
        if (wsUsers && wsUsers.readyState === WebSocket.OPEN) {
            wsUsers.send(JSON.stringify({ action: 'logout' }));
        }
    });
</script>
</body>
</html>
