<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { padding: 20px; } </style>
</head>
<body>

<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center">
        <a href="/productos" class="me-3 text-decoration-none">Tienda</a>
        <span class="me-3 text-muted" th:text="${usuario.nombre}">Admin</span>
        <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>
    </div>
</nav>

<h2 class="mb-4">Panel de Administración</h2>

<!-- Formulario crear producto -->
<div class="card mb-4">
    <div class="card-header fw-bold">Agregar Nuevo Producto</div>
    <div class="card-body">
        <form action="/admin/productos" method="post" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Precio (RD$)</label>
                    <input type="number" name="precio" step="0.01" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Inventario</label>
                    <input type="number" name="inventario" class="form-control" required>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Descripción</label>
                    <input type="text" name="descripcion" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Imagen</label>
                    <input type="file" name="imagen" accept="image/*" class="form-control">
                </div>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Agregar Producto</button>
        </form>
    </div>
</div>

<!-- Tabla de productos -->
<table class="table table-bordered table-striped align-middle">
    <thead class="table-dark">
    <tr>
        <th>Imagen</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${productos}">
        <td>
            <img th:if="${p.imagenBase64 != null}"
                 th:src="'data:image/jpeg;base64,' + ${p.imagenBase64}"
                 width="60" height="60" style="object-fit:cover; border-radius:6px;">
            <span th:if="${p.imagenBase64 == null}" class="text-muted">Sin imagen</span>
        </td>
        <td th:text="${p.nombre}"></td>
        <td th:text="${p.descripcion != null ? p.descripcion : '-'}"></td>
        <td th:text="'RD$ ' + ${p.precio}"></td>
        <td th:text="${p.inventario}"></td>
        <td>
            <button class="btn btn-warning btn-sm btn-editar"
                    th:data-id="${p.id}"
                    th:data-nombre="${p.nombre}"
                    th:data-precio="${p.precio}"
                    th:data-inventario="${p.inventario}"
                    th:data-descripcion="${p.descripcion}">
                Editar
            </button>
            <form th:action="'/admin/productos/' + ${p.id} + '/delete'" method="post" style="display:inline">
                <button type="submit" class="btn btn-danger btn-sm"
                        onclick="return confirm('¿Eliminar este producto?')">Eliminar</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formEditar" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="id" id="editId">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" id="editNombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input type="text" name="descripcion" id="editDescripcion" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" name="precio" id="editPrecio" step="0.01" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Inventario</label>
                        <input type="number" name="inventario" id="editInventario" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nueva Imagen (opcional)</label>
                        <input type="file" name="imagen" accept="image/*" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('.btn-editar').forEach(btn => {
        btn.addEventListener('click', function() {
            document.getElementById('editId').value = this.dataset.id;
            document.getElementById('editNombre').value = this.dataset.nombre;
            document.getElementById('editPrecio').value = this.dataset.precio;
            document.getElementById('editInventario').value = this.dataset.inventario;
            document.getElementById('editDescripcion').value = this.dataset.descripcion !== 'null' ? this.dataset.descripcion : '';
            document.getElementById('formEditar').action = '/admin/productos/' + this.dataset.id + '/update';
            new bootstrap.Modal(document.getElementById('modalEditar')).show();
        });
    });
</script>
</body>
</html>
