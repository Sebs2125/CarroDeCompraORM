<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${producto.nombre} + ' - Tienda'">Detalle Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { padding: 20px; }</style>
</head>
<body>

<!-- ── Navbar con contador de usuarios (Punto 2) ── -->
<nav class="navbar mb-4 border-bottom pb-2">
    <a class="navbar-brand fw-bold fs-4" href="/productos">Carrito Compra</a>
    <div class="d-flex align-items-center gap-3">

        <!-- Contador en tiempo real — se actualiza via WebSocket -->
        <span class="badge bg-secondary">
            🟢 <span id="contadorUsuarios">0</span> usuario(s) en línea
        </span>

        <a href="/productos" class="text-decoration-none">Tienda</a>

        <a th:if="${usuario != null && usuario.confirmarAdmin}"
           href="/admin" class="text-decoration-none">Admin</a>

        <a th:if="${usuario == null}"
           href="/login" class="text-decoration-none text-primary fw-bold">Iniciar Sesión</a>

        <th:block th:if="${usuario != null}">
            <span class="text-muted" th:text="${usuario.nombre}">Usuario</span>
            <a href="/carrito" class="btn btn-outline-primary btn-sm">
                Carrito (<span th:text="${cantidadCarro}">0</span>)
            </a>
            <a href="/logout" class="text-decoration-none text-danger fw-bold">Salir</a>
        </th:block>
    </div>
</nav>

<!-- ── Detalle del producto ── -->
<div class="row">
    <div class="col-md-4">
        <img th:if="${producto.imagenBase64 != null}"
             th:src="'data:image/jpeg;base64,' + ${producto.imagenBase64}"
             class="img-fluid rounded shadow" style="max-height:300px; object-fit:cover;">
        <div th:if="${producto.imagenBase64 == null}"
             class="bg-light d-flex align-items-center justify-content-center rounded"
             style="height:250px;">
            <span class="text-muted">Sin imagen</span>
        </div>
    </div>
    <div class="col-md-8">
        <h2 th:text="${producto.nombre}">Nombre</h2>
        <p class="text-muted" th:text="${producto.descripcion != null ? producto.descripcion : 'Sin descripción'}"></p>
        <h4 class="text-success">RD$ <span th:text="${producto.precio}"></span></h4>
        <p>Stock: <strong th:text="${producto.inventario}"></strong></p>

        <form action="/carrito/add" method="post" class="d-flex gap-2 mt-3">
            <input type="hidden" name="productoId" th:value="${producto.id}">
            <input type="number" name="cantidad" value="1" min="1" class="form-control w-25">
            <button type="submit" class="btn btn-success">Agregar al carrito</button>
        </form>
    </div>
</div>

<hr class="my-4">

<!-- ── Sección de comentarios (Punto 3) ── -->
<h4>Comentarios</h4>

<!-- Formulario para agregar comentario (solo usuarios autenticados) -->
<div th:if="${usuario != null}" class="mb-4">
    <form th:action="'/productos/' + ${producto.id} + '/comentarios'" method="post">
        <div class="d-flex gap-2">
            <input type="text" name="contenido" class="form-control"
                   placeholder="Escribe un comentario..." required>
            <button type="submit" class="btn btn-primary">Comentar</button>
        </div>
    </form>
</div>
<p th:if="${usuario == null}" class="text-muted">
    <a href="/login">Inicia sesión</a> para comentar.
</p>

<!-- Lista de comentarios — cada uno tiene data-comentario-id para el WebSocket -->
<div id="listaComentarios">
    <div th:if="${#lists.isEmpty(comentarios)}" class="text-muted" id="sinComentarios">
        No hay comentarios aún.
    </div>

    <div th:each="c : ${comentarios}"
         th:id="'comentario-' + ${c.id}"
         class="card mb-2">
        <div class="card-body py-2 d-flex justify-content-between align-items-start">
            <div>
                <strong th:text="${c.usuario.nombre}">Usuario</strong>
                <span class="text-muted small ms-2"
                      th:text="${#temporals.format(c.fecha, 'dd/MM/yyyy HH:mm')}">fecha</span>
                <p class="mb-0 mt-1" th:text="${c.contenido}">Contenido</p>
            </div>
            <!-- Botón eliminar solo visible para admin -->
            <form th:if="${usuario != null && usuario.confirmarAdmin}"
                  th:action="'/productos/' + ${producto.id} + '/comentarios/' + ${c.id} + '/delete'"
                  method="post">
                <button type="submit" class="btn btn-danger btn-sm"
                        onclick="return confirm('¿Eliminar este comentario?')">
                    Eliminar
                </button>
            </form>
        </div>
    </div>
</div>

<!-- ── JavaScript — WebSocket para Puntos 2 y 3 ── -->
<script th:inline="javascript">
    // ID del producto actual — Thymeleaf lo inyecta al renderizar
    const productoId = /*[[${producto.id}]]*/ 0;

    // Abrir conexión WebSocket con el servidor
    const socket = new WebSocket("ws://" + location.host + "/ws/usuarios");

    socket.onopen = function () {
        console.log("WebSocket conectado");

        // PUNTO 3 — Decirle al servidor qué producto estamos viendo
        // El servidor usará esto para saber a quién notificar cuando se borre un comentario
        socket.send(JSON.stringify({
            tipo: "verProducto",
            productoId: productoId
        }));
    };

    socket.onmessage = function (evento) {
        const datos = JSON.parse(evento.data);

        // PUNTO 2 — Actualizar el contador de usuarios en la navbar
        if (datos.tipo === "contador") {
            document.getElementById("contadorUsuarios").textContent = datos.usuarios;
        }

        // PUNTO 3 — Eliminar comentario del DOM sin recargar la página
        if (datos.tipo === "comentarioEliminado") {
            const elementoComentario = document.getElementById("comentario-" + datos.comentarioId);
            if (elementoComentario) {
                // Pequeña animación antes de remover
                elementoComentario.style.transition = "opacity 0.4s";
                elementoComentario.style.opacity = "0";
                setTimeout(() => {
                    elementoComentario.remove();
                    // Si no quedan comentarios, mostrar el mensaje vacío
                    const lista = document.getElementById("listaComentarios");
                    const quedan = lista.querySelectorAll("[id^='comentario-']").length;
                    if (quedan === 0) {
                        lista.innerHTML = '<div class="text-muted">No hay comentarios aún.</div>';
                    }
                }, 400);
            }
        }
    };

    socket.onclose = function () {
        console.log("WebSocket desconectado");
        // Actualizar el contador a 0 en esta pestaña
        document.getElementById("contadorUsuarios").textContent = "?";
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
