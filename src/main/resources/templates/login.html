<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        .login-card h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #1a1a1a;
        }
        .back-link { color: #888; text-decoration: none; font-size: .82rem; }
        .back-link:hover { color: #0d6efd; }
    </style>
</head>

<body>

<div class="login-card">

    <h2>Login</h2>
    <p class="text-muted">Carrito Compra</p>

    <div th:if="${error != null}" class="alert alert-danger py-2 px-3 mb-3" style="font-size:.85rem;">
        <span th:text="${error}">Usuario o contraseña incorrectos.</span>
    </div>

    <form action="/login" method="post">

        <div class="mb-3">
            <label class="form-label" for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario"
                   class="form-control" placeholder="Tu usuario"
                   autocomplete="username" required autofocus>
        </div>

        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password"
                   class="form-control" placeholder="••••••••"
                   autocomplete="current-password" required>
        </div>

        <div class="mb-3 form-check">
            <input class="form-check-input" type="checkbox"
                   id="recordar" name="recordar" value="true">
            <label class="form-check-label" for="recordar">Recordar por una semana</label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Entrar</button>

    </form>

    <a href="/productos" class="back-link d-block text-center mt-3">← Volver a la tienda</a>

</div>

</body>
</html>
