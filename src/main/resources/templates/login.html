<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<head>
    <meta charset="UTF-8">

    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{

            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100%;


        }
        .login-card{
            background-color: #fff;
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);


        }
        .login-card h2{
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #1a1a1a;

        }



        .back-link:hover { color: #0d6efd; }




    </style>
</head>


<body>

<div class="login-card">


    <h2>Login</h2>
    <p class="subtitle">Carrito compra</p>

    <form action="/login" method="post">

        <div class="mb-3">
            <label class ="form-label" for = "username">Usuario</label>
            <input type="text" id="username"  name="username"
                   class="form-control" placeholder ="Tu usuario"
                   autocomplete ="username" required autofocus />


        </div>

        <div class="mb-3">
            <label class ="form-label" for = "password">Password</label>
            <input type="password"  id="password" name="password"
                   class="form-control" placeholder="••••••••"
                   autocomplete="current-password" required >"


        </div>

        <div class="mb-3 form-check">
            <input class="fro-check-input" type="checkbox"
                   id="remember" name = "remember" value = "true">
            <label class="from-check-label" for = "remember"> Recorda en una semana </label>


        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>



    </form>
    <a href="/templates/productos.html" class="back-link"> ← Volver a la tienda  </a>

</div>
</body>

</html>
